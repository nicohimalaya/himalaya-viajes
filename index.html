<!DOCTYPE html>
<!-- Himalaya Viajes - Valle Escondido - Panel de Gestion -->
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Himalaya Viajes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0efeb;color:#1a1a1a;font-size:14px}
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.lc{background:#fff;border-radius:12px;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.lh{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.sq{width:38px;height:38px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.fg{margin-bottom:.875rem}
.fg label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px;font-weight:500}
.fg input{width:100%;padding:8px 11px;border:1px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;outline:none}
.fg input:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.btn-pr{width:100%;padding:10px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin-bottom:.75rem}
.btn-pr:hover{background:#0C447C}
.err{color:#b91c1c;font-size:12px;margin-top:8px;text-align:center;display:none}
.hint{font-size:11px;color:#9ca3af;margin-top:1.25rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,.08);line-height:1.8}
.al{display:flex;min-height:100vh;display:none}
.sb{width:220px;min-width:220px;background:#fff;border-right:1px solid rgba(0,0,0,.1);display:flex;flex-direction:column;padding:1.25rem 1rem;position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.sbl{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid rgba(0,0,0,.08)}
.nb{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer;color:#6b7280;border:none;background:transparent;text-align:left;width:100%}
.nb:hover{background:#f5f5f4;color:#1a1a1a}
.nb.on{background:#E6F1FB;color:#185FA5;font-weight:600}
.sbf{margin-top:auto;padding-top:1rem;border-top:1px solid rgba(0,0,0,.08)}
.av{width:30px;height:30px;border-radius:50%;background:#B5D4F4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#185FA5;flex-shrink:0}
.av.adm{background:#C0DD97;color:#0F6E56}
.main{flex:1;margin-left:220px;padding:2rem}
.btn{padding:8px 14px;border:1px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer}
.btn:hover{background:#f5f5f4}
.btn.pr{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.sc{background:#0F6E56;color:#fff;border-color:#0F6E56}
.btn.rd{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn.sm{padding:5px 11px;font-size:12px}
.btn.fw{width:100%;text-align:center}
.card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.st{background:#f5f5f4;border-radius:8px;padding:.875rem}
.stl{font-size:11px;color:#6b7280;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.03em}
.stv{font-size:20px;font-weight:700}
.pt{font-size:20px;font-weight:700;margin-bottom:.25rem}
.ps{font-size:13px;color:#6b7280;margin-bottom:1.25rem}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.1);color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase}
td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.08);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9f9f9}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bdg.co{background:#EAF3DE;color:#0F6E56}
.bdg.pe{background:#FAEEDA;color:#854F0B}
.bdg.ca{background:#FCEBEB;color:#A32D2D}
.bdg.pr2{background:#E6F1FB;color:#185FA5}
.bdg.us{background:#EAF3DE;color:#0F6E56}
.bdg.ar{background:#E6F1FB;color:#185FA5}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.ff{display:flex;flex-direction:column;gap:4px}
.ff label{font-size:12px;color:#6b7280;font-weight:500}
.ff input,.ff select,.ff textarea{padding:7px 10px;border:1px solid rgba(0,0,0,.2);border-radius:8px;font-size:13px;outline:none;width:100%}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.ff textarea{resize:vertical;min-height:52px}
.ff.fw{grid-column:1/-1}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.875rem}
.pill{padding:4px 11px;border-radius:20px;border:1px solid rgba(0,0,0,.2);font-size:12px;cursor:pointer;background:#fff;color:#6b7280}
.pill.on{background:#185FA5;color:#fff;border-color:#185FA5}
.ctog{display:inline-flex;border:1px solid rgba(0,0,0,.2);border-radius:8px;overflow:hidden;margin-bottom:.875rem}
.cb{padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#6b7280}
.cb.on{background:#185FA5;color:#fff}
.svb{border:1px solid rgba(0,0,0,.15);border-radius:12px;padding:1rem;margin-bottom:.875rem;background:#fff}
.svh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.svn{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em}
.cb2{border-radius:8px;padding:.875rem;margin-top:.75rem}
.cb2.us{background:#EAF3DE;border:1px solid #C0DD97}
.cb2.ar{background:#E6F1FB;border:1px solid #B5D4F4}
.cr{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
.cr.sb{padding:2px 0 2px 10px;font-size:12px}
.cr.tt{font-weight:700;font-size:14px;border-top:1px solid rgba(0,0,0,.1);padding-top:7px;margin-top:4px}
.tbar{background:#185FA5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.cfb{background:#EAF3DE;border:1px solid #C0DD97;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.al2{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:.875rem}
.al2.inf{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4}
.al2.suc{background:#EAF3DE;color:#0F6E56;border:1px solid #C0DD97}
.al2.nt{background:#fffbeb;color:#92400e;border:1px solid #fcd34d;font-size:12px}
.ibox{background:#f5f5f4;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:8px 12px;margin-top:6px;font-size:12px}
.itit{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;margin-bottom:4px}
.irow{display:flex;justify-content:space-between;padding:2px 0;color:#6b7280}
.imgc{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.imgt{position:relative;border:1px solid #C0DD97;border-radius:8px;padding:4px;background:#EAF3DE}
.imgt img{max-width:100%;max-height:120px;border-radius:4px;display:block}
.imgt .xb{position:absolute;top:4px;right:4px;background:#A32D2D;color:#fff;border:none;border-radius:4px;padding:1px 6px;font-size:11px;cursor:pointer}
.pt2{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.pt2.pd{background:#EAF3DE;color:#0F6E56}
.pt2.pn{background:#E6F1FB;color:#185FA5}
.pt2.pv{background:#FAEEDA;color:#854F0B}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;display:none}
.md{background:#fff;border-radius:12px;padding:1.5rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.sl{font-size:12px;color:#6b7280;font-weight:500;margin-bottom:5px;margin-top:1rem}
.csec{font-size:10px;font-weight:700;text-transform:uppercase;color:#9ca3af;margin:1rem 0 .5rem}
.crow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.08)}
.crow:last-child{border-bottom:none}
.ci{width:65px;text-align:right;padding:4px 7px;border:1px solid rgba(0,0,0,.2);border-radius:8px;font-size:13px;outline:none}
.arow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.08)}
.arow:last-child{border-bottom:none}
input[type=date]{font-family:inherit}
</style>
</head>
<body>

<div class="lw" id="LS">
  <div class="lc">
    <div class="lh">
      <div class="sq">HV</div>
      <div>
        <div style="font-size:17px;font-weight:700">Himalaya Viajes</div>
        <div style="font-size:12px;color:#6b7280">Valle Escondido</div>
      </div>
    </div>
    <div class="fg"><label>Usuario</label><input type="text" id="uu" placeholder="tamara, nicolas, etc."/></div>
    <div class="fg"><label>Contrasena</label><input type="password" id="up" placeholder="Contrasena"/></div>
    <button class="btn-pr" id="btnIn">Ingresar</button>
    <div style="text-align:center;font-size:12px;color:#6b7280">
      Admin: <span style="color:#185FA5;cursor:pointer;font-weight:600;text-decoration:underline" id="lnkAdm">clic para entrar como admin</span>
    </div>
    <div class="err" id="lerr">Usuario o contrasena incorrectos.</div>
    <div class="hint">
      Agentes: <b>tamara</b> / <b>belen</b> / <b>benjamin</b> / <b>pilar</b> &mdash; clave: <b>1234</b><br>
      Admin: <b>nicolas</b> / <b>mauro</b> &mdash; clave: <b>1234</b>
    </div>
  </div>
</div>

<div id="APP" style="display:none;min-height:100vh">
  <div class="sb">
    <div class="sbl">
      <div class="sq" style="width:28px;height:28px;font-size:11px">HV</div>
      <div style="font-size:13px;font-weight:700;line-height:1.3">Himalaya Viajes<br>
        <span style="font-weight:400;font-size:11px;color:#9ca3af">Valle Escondido</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px;flex:1" id="SN"></div>
    <div class="sbf">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="av" id="AV"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="UN"></div>
          <div style="font-size:11px;color:#9ca3af" id="UR"></div>
        </div>
        <button style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:11px" id="btnOut">salir</button>
      </div>
    </div>
  </div>
  <div class="main" id="CA"></div>
</div>

<div id="PM" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem">
  <div class="md">
    <div class="mh">
      <div style="font-size:16px;font-weight:700">Generar PDF</div>
      <button style="background:none;border:none;cursor:pointer;font-size:22px;color:#9ca3af" id="closePM">&#215;</button>
    </div>
    <div id="PMB"></div>
  </div>
</div>

<div id="PGM" style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem">
  <div class="md" style="max-width:420px">
    <div class="mh">
      <div style="font-size:16px;font-weight:700">Registrar pago</div>
      <button style="background:none;border:none;cursor:pointer;font-size:22px;color:#9ca3af" id="closePGM">&#215;</button>
    </div>
    <div id="PGMB"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// All code wrapped in IIFE to avoid global scope pollution

var US = {};
US['tamara']   = {p:'1234',r:'agent',n:'Tamara Cabiche',i:'TC'};
US['belen']    = {p:'1234',r:'agent',n:'Belen Pugliese',i:'BP'};
US['benjamin'] = {p:'1234',r:'agent',n:'Benjamin Sans',i:'BS'};
US['pilar']    = {p:'1234',r:'agent',n:'Pilar Cuesta',i:'PC'};
US['nicolas']  = {p:'1234',r:'admin',n:'Nicolas Benaderet',i:'NB'};
US['mauro']    = {p:'1234',r:'admin',n:'Mauro Goldenhersch',i:'MG'};

var CFG = {
  ae:{Sudameria:{h:7},Delfos:{h:7}},
  ht:{Delfos:{c:14,h:7,g:3},Destefanis:{c:15,h:7,g:3.5},Sudameria:{c:15,h:7,g:3.5},
      Ola:{c:0,h:7.5,g:0},T360:{c:0,h:7.5,g:0},Laplace:{c:0,h:7.5,g:0},Milford:{c:0,h:7.5,g:0}},
  cr:{Almundo:{m:8},'Despegar B2B':{m:9},'Gol Viajes':{m:10},Bonvarena:{m:11}},
  ot:{Almundo:{hoteles:10,excursiones:15,autos:11},'Despegar B2B':{hoteles:12,excursiones:14,autos:12},
      'Gol Viajes':{hoteles:9,excursiones:13,autos:10},Bonvarena:{hoteles:11,excursiones:12,autos:9}},
  as:{Universal:{},Interassist:{}}
};
var CFGN={T360:'360'};
function dn2(k){return CFGN[k]||k;}

var PROVS=[
  {id:'familiar',l:'Familiar',c:50},{id:'amigo',l:'Amigo',c:50},
  {id:'pauta',l:'Pauta',c:30},{id:'agencia',l:'Agencia',c:30},
  {id:'nico',l:'Nico',c:10},{id:'mauro',l:'Mauro',c:10}
];
var TIPOS=[
  {id:'vuelos',l:'Vuelos',ic:'✈'},{id:'ht',l:'Hoteles y Transfers',ic:'🏨'},
  {id:'cruceros',l:'Cruceros',ic:'🚢'},{id:'hoteles',l:'Hoteles',ic:'🛏'},
  {id:'excursiones',l:'Excursiones',ic:'🗺'},{id:'autos',l:'Autos',ic:'🚗'},
  {id:'asistencia',l:'Asistencia',ic:'🛡'}
];
var DB=[
  {id:'P001',ag:'Tamara Cabiche',cl:'Ana Garcia',prov:'familiar',tipo:'vuelos',may:'Sudameria',mon:'USD',total:370,pax:2,fvi:'2025-06-15',fvf:'2025-06-22',est:'confirmado',fecha:'2025-03-15',dest:'Buenos Aires - Cancun',svcs:null,imgs:[],pagos:[]},
  {id:'P002',ag:'Belen Pugliese',cl:'Roberto Diaz',prov:'pauta',tipo:'ht',may:'Delfos',mon:'USD',total:896,pax:2,fvi:'2025-07-10',fvf:'2025-07-14',est:'presupuesto',fecha:'2025-03-20',dest:'Hotel Sheraton Mendoza',svcs:null,imgs:[],pagos:[]},
  {id:'P003',ag:'Tamara Cabiche',cl:'Valeria Torres',prov:'amigo',tipo:'cruceros',may:'Gol Viajes',mon:'USD',total:2750,pax:4,fvi:'2025-08-01',fvf:'2025-08-10',est:'confirmado',fecha:'2025-03-22',dest:'Crucero Caribe',svcs:null,imgs:[],pagos:[{m:1375,f:'22/03/2025',n:'Primera cuota'}]},
  {id:'P004',ag:'Pilar Cuesta',cl:'Juan Lopez',prov:'agencia',tipo:'excursiones',may:'Bonvarena',mon:'ARS',total:95200,pax:1,fvi:'2025-05-20',fvf:'2025-05-22',est:'pendiente',fecha:'2025-03-25',dest:'Cataratas',svcs:null,imgs:[],pagos:[]}
];

var cu=null,svcs=[],sid=0,imgT=null;

// helpers
function fa(n){return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(n);}
function fu(n){return 'U$S '+new Intl.NumberFormat('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);}
function fm(n,m){return m==='USD'?fu(n):fa(n);}
function pc(n,p){return Math.round(n*(p/100)*100)/100;}
function tlb(t){return {vuelos:'✈ Vuelos',ht:'🏨 H.Transfers',cruceros:'🚢 Cruceros',hoteles:'🛏 Hoteles',excursiones:'🗺 Excursiones',autos:'🚗 Autos',asistencia:'🛡 Asistencia',multi:'📦 Multi'}[t]||t;}
function tnm(t){return {vuelos:'Vuelos',ht:'Hoteles y Transfers',cruceros:'Cruceros',hoteles:'Hoteles',excursiones:'Excursiones/Transfers',autos:'Alquiler de Auto',asistencia:'Asistencia al Viajero',multi:'Paquete'}[t]||t;}
function bst(e){return {confirmado:'co',pendiente:'pe',presupuesto:'pr2',cancelado:'ca'}[e]||'pr2';}
function bsl(e){return {confirmado:'Confirmado',pendiente:'Pendiente',presupuesto:'Presupuesto',cancelado:'Cancelado'}[e]||e;}
function fmtD(s){return s?new Date(s+'T00:00:00').toLocaleDateString('es-AR'):'';}
function a30(s){if(!s)return '30 dias antes';var d=new Date(s+'T00:00:00');d.setDate(d.getDate()-30);return d.toLocaleDateString('es-AR');}
function plbl(id){var p=PROVS.find(function(x){return x.id===id;});return p?p.l:'';}
function pcom(id){var p=PROVS.find(function(x){return x.id===id;});return p?p.c:0;}
function G(id){return document.getElementById(id);}
function gv(id){var e=G(id);return e?e.value:'';}
function gf(id){var e=G(id);return e?parseFloat(e.value)||0:0;}
function gi(id){var e=G(id);return e?parseInt(e.value)||1:1;}
function myDB(){return DB.filter(function(p){return p.ag===US[cu].n;});}
function mayK(t){
  if(t==='vuelos')return Object.keys(CFG.ae);
  if(t==='ht')return Object.keys(CFG.ht);
  if(t==='cruceros')return Object.keys(CFG.cr);
  if(t==='asistencia')return Object.keys(CFG.as);
  return Object.keys(CFG.ot);
}
function showEl(id){G(id).style.display='flex';}
function hideEl(id){G(id).style.display='none';}

// AUTH
function doLogin(){
  var u=gv('uu').trim().toLowerCase().replace('@agencia.com','');
  var p=gv('up');
  var err=G('lerr');
  if(US[u]&&US[u].p===p){err.style.display='none';launch(u);}
  else{err.style.display='block';}
}
function launch(u){
  cu=u;var usr=US[u];
  G('LS').style.display='none';
  G('APP').style.display='flex';
  G('AV').textContent=usr.i;
  G('AV').className='av'+(usr.r==='admin'?' adm':'');
  G('UN').textContent=usr.n;
  G('UR').textContent=usr.r==='admin'?'Administrador':'Agente';
  buildNav(usr.r);
  goSec(usr.r==='admin'?'overview':'mis');
}
function doLogout(){
  cu=null;
  G('LS').style.display='flex';
  G('APP').style.display='none';
  G('uu').value='';G('up').value='';
}

// Wire up login events safely
G('btnIn').addEventListener('click',doLogin);
G('btnOut').addEventListener('click',doLogout);
G('lnkAdm').addEventListener('click',function(){launch('nicolas');});
G('uu').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
G('up').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
G('closePM').addEventListener('click',function(){hideEl('PM');});
G('closePGM').addEventListener('click',function(){hideEl('PGM');});

// NAV
function buildNav(role){
  var nav=G('SN');nav.innerHTML='';
  var items=role==='admin'
    ?[{id:'overview',l:'Resumen general',ic:'📊'},{id:'todos',l:'Todos los presupuestos',ic:'📋'},{id:'agentes',l:'Agentes',ic:'👥'},{id:'config',l:'Configuracion',ic:'⚙️'}]
    :[{id:'mis',l:'Mis presupuestos',ic:'📋'},{id:'nueva',l:'Nueva cotizacion',ic:'🧮'},{id:'ventas',l:'Mis ventas',ic:'📈'}];
  items.forEach(function(it,i){
    var b=document.createElement('button');
    b.className='nb'+(i===0?' on':'');
    b.dataset.sec=it.id;
    b.innerHTML='<span style="font-size:14px">'+it.ic+'</span>'+it.l;
    b.addEventListener('click',function(){
      document.querySelectorAll('.nb').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');goSec(it.id);
    });
    nav.appendChild(b);
  });
}
function goSec(id){
  document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.dataset.sec===id);});
  var a=G('CA');a.innerHTML='';
  ({mis:pgMis,nueva:pgNueva,ventas:pgVentas,overview:pgOverview,todos:pgTodos,agentes:pgAgentes,config:pgConfig}[id]||function(){})(a);
}

// MIS PRESUPUESTOS
function pgMis(a){
  var ps=myDB();window._mp=ps;
  var rows=ps.map(function(p,i){
    var pp=p.pax>1?'<br><small style="color:#9ca3af">'+fm(Math.round(p.total/p.pax*100)/100,p.mon)+'/pax</small>':'';

// CALC
function calc(id){
  var s=svcs.find(function(x){return x.id===id;});if(!s)return;
  var tipo=s.tipo;var usd=s.mon==='USD';
  var may=gv('MJ'+id);
  var box=G('CC'+id);var ib=G('IB'+id);if(!box)return;
  box.className='cb2 '+(usd?'us':'ar');
  var fS=usd?fu:fa;
  var lc=usd?'color:#0F6E56;font-weight:600':'color:#185FA5;font-weight:600';
  var vc=usd?'color:#27500A;font-weight:600':'color:#0C447C;font-weight:600';
  var sc2=usd?'color:#639922':'color:#378ADD';
  function rw(l,v){return '<div class="cr"><span style="'+lc+'">'+l+'</span><span style="'+vc+'">'+v+'</span></div>';}
  function rs(l,v){return '<div class="cr sb"><span style="font-size:12px;'+sc2+'">'+l+'</span><span style="'+vc+'">'+v+'</span></div>';}
  function rt(l,v){return '<div class="cr tt"><span style="'+lc+'">'+l+'</span><span style="'+vc+'">'+v+'</span></div>';}
  var rows='',ihtml='',ok=false;

  if(tipo==='vuelos'){
    var ne=gf('NE'+id);if(!ne){h3(box,ib,s);updTotal();return;}
    var hp=CFG.ae[may]?CFG.ae[may].h:7;
    var im=pc(ne,hp);var fe=gf('FE'+id);
    var tot=ne+im+fe;s.total=Math.round(tot*100)/100;s.may=dn2(may);ok=true;
    rows=rw('Costo neto',fS(ne))+rs('Himalaya '+hp+'%',fS(im))+rs('Fee agencia',fS(fe))+rt('Total',fS(tot));
  } else if(tipo==='ht'){
    var ne=gf('NE'+id);if(!ne){h3(box,ib,s);updTotal();return;}
    var cfg=CFG.ht[may]||{c:0,h:7,g:0};
    var ha=pc(ne,cfg.h),ga=pc(ne,cfg.g),ca=pc(ne,cfg.c);
    var tot=ne+ha+ga;s.total=Math.round(tot*100)/100;s.may=dn2(may);ok=true;
    rows=rw('Costo neto',fS(ne))+rs('Himalaya '+cfg.h+'%',fS(ha))+rs('G.Admin '+cfg.g+'%',fS(ga))+rt('Total',fS(tot));
    if(cfg.c>0)ihtml='<div class="itit">Desglose interno</div>'
      +'<div class="irow"><span>Comision incluida ('+cfg.c+'%)</span><span>'+fS(ca)+'</span></div>'
      +'<div class="irow"><span>Neto sin comision</span><span>'+fS(ne-ca)+'</span></div>';
  } else if(tipo==='cruceros'){
    var ne=gf('NE'+id);if(!ne){h3(box,ib,s);updTotal();return;}
    var mp=(CFG.cr[may]?CFG.cr[may].m:10)/100;
    var mu=Math.round(ne*mp*100)/100;
    var ex=gf('MX'+id);var ea=Math.round(ne*(ex/100)*100)/100;
    var tot=ne+mu+ea;s.total=Math.round(tot*100)/100;s.may=dn2(may);ok=true;
    rows=rw('Costo neto',fS(ne))+rs('Markup '+Math.round(mp*100)+'%',fS(mu))+(ex?rs('Extra '+ex+'%',fS(ea)):'')+rt('Total',fS(tot));
  } else if(tipo==='asistencia'){
    if(may==='Universal'){
      var pc2=gf('PC'+id);if(!pc2){h3(box,ib,s);updTotal();return;}
      var cpv=Math.round(pc2*0.6*100)/100,ren=Math.round((pc2-cpv)*100)/100;
      var cp=G('CP'+id);if(cp)cp.value=fS(cpv);
      s.total=pc2;s.may=dn2(may);ok=true;
      rows=rw('Precio final al cliente',fS(pc2))+rs('Costo proveedor 60%',fS(cpv))+rs('Rentabilidad 40%',fS(ren))+rt('Total al cliente',fS(pc2));
    } else if(may==='Interassist'){
      var ne=gf('NE'+id);if(!ne){h3(box,ib,s);updTotal();return;}
      var fe=gf('FE'+id),tot=ne+fe;
      s.total=Math.round(tot*100)/100;s.may=dn2(may);ok=true;
      rows=rw('Costo neto',fS(ne))+rs('Fee agencia',fS(fe))+rt('Total',fS(tot));
    } else {h3(box,ib,s);updTotal();return;}
  } else {
    var ne=gf('NE'+id);if(!ne){h3(box,ib,s);updTotal();return;}
    var mp2=CFG.ot[may]?CFG.ot[may][tipo]||10:10;
    var mu=Math.round(ne*(mp2/100)*100)/100;
    var ex=gf('MX'+id),ea=Math.round(ne*(ex/100)*100)/100;
    var tot=ne+mu+ea;s.total=Math.round(tot*100)/100;s.may=dn2(may);ok=true;
    rows=rw('Costo neto',fS(ne))+rs('Markup '+mp2+'%',fS(mu))+(ex?rs('Extra '+ex+'%',fS(ea)):'')+rt('Total',fS(tot));
  }
  s.ok=ok;
  if(ok){box.innerHTML=rows;box.style.display='block';}else box.style.display='none';
  if(ihtml){ib.innerHTML=ihtml;ib.style.display='block';}else ib.style.display='none';
  updTotal();
}

// IMAGES
document.addEventListener('paste',function(e){
  if(imgT===null||imgT===undefined)return;
  var id=imgT,s=svcs.find(function(x){return x.id===id;});if(!s)return;
  var items=e.clipboardData&&e.clipboardData.items;if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')>-1){readBlob(items[i].getAsFile(),id);e.preventDefault();break;}
  }
});
function readBlob(blob,id){
  var r=new FileReader();
  r.onload=function(ev){
    var s=svcs.find(function(x){return x.id===id;});if(!s)return;
    if(!s.imgs)s.imgs=[];
    s.imgs.push(ev.target.result);
    renderImgs(id,s.imgs);
  };
  r.readAsDataURL(blob);
}
function renderImgs(id,imgs){
  var cont=G('IM'+id);if(!cont)return;
  cont.innerHTML='';
  (imgs||[]).forEach(function(src,i){
    var d=document.createElement('div');d.className='imgt';
    var img=document.createElement('img');img.src=src;img.style.cssText='max-width:100%;max-height:120px;border-radius:4px;display:block';
    var xb=document.createElement('button');xb.className='xb';xb.textContent='x';
    xb.addEventListener('click',function(){
      var s=svcs.find(function(x){return x.id===id;});if(s&&s.imgs)s.imgs.splice(i,1);
      renderImgs(id,s?s.imgs:[]);
    });
    d.appendChild(img);d.appendChild(xb);cont.appendChild(d);
  });
}

function showEl(id){G(id).style.display='flex';}
function hideEl(id){G(id).style.display='none';}
function savePago(i){
  var p=DB[i];if(!p)return;
  var m=parseFloat(gv('PMT'))||0,n=gv('PNT');
  var err=G('PGERR');
  if(m<=0){err.textContent='Monto invalido.';err.style.display='block';return;}
  var pg=p.pagos.reduce(function(a,b){return a+b.m;},0);
  if(m>p.total-pg+0.01){err.textContent='Supera el saldo pendiente.';err.style.display='block';return;}
  p.pagos.push({m:Math.round(m*100)/100,f:new Date().toLocaleDateString('es-AR'),n:n});
  hideEl('PGM');goSec('todos');
}

  var svsList=svs.map(function(s){return tnm(s.tipo);}).join(', ');
  var subject='Presupuesto Himalaya Viajes - '+p.dest;
  var body='Estimado/a '+p.cl+','
    +'\n\nTe enviamos tu presupuesto de viaje.'
    +'\nDestino: '+p.dest
    +(p.fvi?'\nFecha de inicio: '+fmtD(p.fvi):'')
    +(p.fvf?'\nFecha de finalizacion: '+fmtD(p.fvf):'')
    +(p.pax>1?'\nPasajeros: '+p.pax:'')
    +'\nServicios: '+svsList
    +'\n\nPRECIO TOTAL: '+fS(p.total)+(p.pax>1?' ('+fS(Math.round(p.total/p.pax*100)/100)+' por persona)':'')
    +'\n\nCONDICIONES DE PAGO:'
    +'\n50% al contratar: '+mit
    +'\n50% restante: '+mit
    +'\n\nMedios: Efectivo / Transferencia bancaria'
    +'\n\nNota: La presente cotizacion no es una reserva. Las tarifas quedan sujetas a variacion de precio sin previo aviso y a disponibilidad al momento de realizar la reserva.'
    +'\n\nSaludos,\nHimalaya Viajes - Valle Escondido';
  var email2=p.email||'';
  genPDF();
  setTimeout(function(){window.location.href='mailto:'+email2+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);},1500);
}
function genPDF(){
  var p=window._cpdf;if(!p)return;
  if(!window.jspdf){alert('PDF aun cargando, intenta en un momento.');return;}
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF({unit:'mm',format:'a4'});
  var W=210,M=20,y=M;
  var AZ=[24,95,165],GR=[110,110,110],NE=[30,30,30],CL=[240,246,251];
  function sc(a){doc.setTextColor(a[0],a[1],a[2]);}
  function sd(a){doc.setDrawColor(a[0],a[1],a[2]);}
  function sec(title){
    if(y>250){doc.addPage();y=M;}
    y+=5;doc.setFontSize(10);doc.setFont('helvetica','bold');sc(AZ);
    doc.text(title,M,y);sd(AZ);doc.line(M,y+2,W-M,y+2);y+=8;
  }
  doc.setFillColor(AZ[0],AZ[1],AZ[2]);doc.rect(0,0,W,28,'F');
  sc([255,255,255]);doc.setFontSize(17);doc.setFont('helvetica','bold');doc.text('Himalaya Viajes',M,14);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('Valle Escondido',M,22);
  doc.text('Presupuesto N '+p.id,W-M,12,{align:'right'});
  doc.text('Fecha: '+new Date().toLocaleDateString('es-AR'),W-M,18,{align:'right'});
  doc.text('Agente: '+(US[cu]?US[cu].n:''),W-M,24,{align:'right'});
  y=36;
  doc.setFillColor(CL[0],CL[1],CL[2]);doc.rect(M,y,W-M*2,17,'F');
  sc(NE);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text('CLIENTE',M+3,y+5);
  doc.setFont('helvetica','normal');doc.setFontSize(11);doc.text(p.cl,M+3,y+12);
  y+=23;
  sec('Detalle del viaje');
  sc(NE);doc.setFont('helvetica','normal');doc.setFontSize(10);
  var dl=doc.splitTextToSize(p.dest,W-M*2-28);
  doc.text('Destino:',M,y);doc.setFont('helvetica','bold');doc.text(dl,M+25,y);y+=dl.length*6+2;
  if(p.fvi){doc.setFont('helvetica','normal');doc.text('Fecha de inicio:',M,y);doc.setFont('helvetica','bold');doc.text(fmtD(p.fvi),M+36,y);y+=7;}
  if(p.fvf){doc.setFont('helvetica','normal');doc.text('Fecha de fin:',M,y);doc.setFont('helvetica','bold');doc.text(fmtD(p.fvf),M+30,y);y+=7;}
  if(p.pax>1){doc.setFont('helvetica','normal');doc.text('Pasajeros:',M,y);doc.setFont('helvetica','bold');doc.text(''+p.pax,M+25,y);y+=7;}
  var svs=p.svcs||[{tipo:p.tipo,may:p.may,total:p.total,mon:p.mon,obs:'',imgs:p.imgs||[]}];
  sec('Servicios incluidos');
  svs.forEach(function(sv){
    sc(NE);doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text(tnm(sv.tipo),M,y);y+=6;
    if(sv.obs&&sv.obs.trim()){
      sc(GR);doc.setFont('helvetica','normal');doc.setFontSize(9);
      var ol=doc.splitTextToSize(sv.obs.trim(),W-M*2-4);doc.text(ol,M+4,y);y+=ol.length*5+3;
    }
  });
  var obs=gv('POBS').trim();
  if(obs){sec('Observaciones');sc(NE);doc.setFont('helvetica','normal');doc.setFontSize(9);var ol2=doc.splitTextToSize(obs,W-M*2);doc.text(ol2,M,y);y+=ol2.length*5+4;}
  svs.forEach(function(sv){
    var si=sv.imgs||[];if(!si.length)return;
    sec(tnm(sv.tipo));
    si.forEach(function(src,ii){
      if(y>200){doc.addPage();y=M;}if(ii>0)y+=4;
      try{var fmt=src.indexOf('image/png')>-1?'PNG':'JPEG';doc.addImage(src,fmt,M,y,W-M*2,80,'','FAST');y+=85;}
      catch(ex){sc(GR);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('[Imagen '+(ii+1)+' no disponible]',M,y);y+=8;}
    });
  });
  if(y>220){doc.addPage();y=M;}
  y+=6;
  var fS=p.mon==='USD'?fu:fa,h=p.pax>1?22:16;
  doc.setFillColor(AZ[0],AZ[1],AZ[2]);doc.rect(M,y,W-M*2,h,'F');
  sc([255,255,255]);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text('PRECIO TOTAL DEL VIAJE',M+4,y+7);
  doc.setFontSize(15);doc.setFont('helvetica','bold');doc.text(fS(p.total),W-M-4,y+7,{align:'right'});
  if(p.pax>1){doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(fS(Math.round(p.total/p.pax*100)/100)+' por persona ('+p.pax+' pasajeros)',W-M-4,y+15,{align:'right'});}
  y+=h+8;
  sec('Condiciones de pago');
  var cA=svs.every(function(s){return s.tipo==='vuelos'||s.tipo==='asistencia';});
  var mit=Math.round(p.total/2*100)/100,vto=p.fvi?a30(p.fvi):'30 dias antes del viaje';
  sc(NE);doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text('50% al contratar: '+fS(mit),M,y);y+=7;
  doc.text(cA?'50% restante: '+fS(mit)+' al contratar':'50% restante: '+fS(mit)+' hasta el '+vto,M,y);y+=7;
  sc(GR);doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Medios: Efectivo  Transferencia bancaria',M,y);y+=8;
  var fY=287;sd(AZ);doc.line(M,fY-5,W-M,fY-5);
  sc(GR);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
  var ft='La presente cotizacion no es una reserva. Las tarifas quedan sujetas a variacion de precio sin previo aviso y a disponibilidad al momento de realizar la reserva.';
  var ftL=doc.splitTextToSize(ft,W-M*2);doc.text(ftL,W/2,fY,{align:'center'});
  doc.text('Himalaya Viajes  Valle Escondido',W/2,fY+ftL.length*4+1,{align:'center'});
  doc.save('Presupuesto_'+p.id+'_'+p.cl.replace(/\s/g,'_')+'.pdf');
  hideEl('PM');
}

</script>
